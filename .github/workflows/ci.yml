name: CI

on:
  pull_request:
    branches:
      - dev # dev 브랜치로 PR이 생성될 때 실행

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run lint check
        run: npm run lint

      - name: Run tests
        run: npm run test
